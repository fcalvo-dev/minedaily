spring.datasource.url=jdbc:h2:mem:minedaily;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

minedaily.challenge.timezone=America/Argentina/Cordoba
minedaily.challenge.rollover-hour=21
minedaily.challenge.rollover-cron=0 0 21 * * *
minedaily.challenge.rows=10
minedaily.challenge.cols=10
minedaily.challenge.mine-count=18
minedaily.challenge.generator-version=test-v1
minedaily.challenge.seed-namespace=minedaily-test

minedaily.dev.endpoints.enabled=true
