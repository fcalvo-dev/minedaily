spring.application.name=minedaily

spring.datasource.url=jdbc:postgresql://localhost:5432/minedaily
spring.datasource.username=minedaily
spring.datasource.password=minedaily
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.open-in-view=false

minedaily.challenge.timezone=America/Argentina/Cordoba
minedaily.challenge.rollover-hour=21
minedaily.challenge.rollover-cron=0 0 21 * * *
minedaily.challenge.rows=10
minedaily.challenge.cols=10
minedaily.challenge.mine-count=18
minedaily.challenge.generator-version=v1
minedaily.challenge.seed-namespace=minedaily-local-v1

minedaily.dev.endpoints.enabled=true
